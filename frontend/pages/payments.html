href="../css/style.css">

</head>

<div class="container">

<aside class="sidebar">

<p>Smart Tailoring Shop</p>

</div>

<ul>

<li>

<main class="main-content">

<div class="top-bar">

<h1>Payments</h1>

</div>



<div class="box">

<div class="customer-form">



<input

id="payment-search"

type="text"

placeholder="🔍 Search Order"

>



<select

id="payment-order"

>

<option value="">

Select Order

</option>

</select>



<input

id="payment-total"

type="number"

placeholder="Total Amount"

>



<input

id="payment-paid"

type="number"

placeholder="Paid Amount"

>



<select

id="payment-method"

>

<option value="cash">

Cash

</option>

<option value="upi">

UPI

</option>

<option value="card">

Card

</option>

</select>



<input

id="payment-date"

type="date"

>



<button

id="add-payment-btn"

class="add-btn"

>

+ Add Payment

</button>



</div>



<table id="payments-table">

<thead>

<tr>

<th>Order</th>

<th>Total</th>

<th>Paid</th>

<th>Remaining</th>

<th>Method</th>

<th>Paid On</th>

<th>Actions</th>

</tr>

</thead>

<tbody>

</tbody>

</table>
