<h1>Customers</h1>

<div class="box">

<!-- Add Customer Section -->

<div style="display:flex;gap:10px;flex-wrap:wrap;margin-bottom:20px;">

<input

id="customer-name"

type="text"

placeholder="Customer Name"

style="padding:12px;flex:1;min-width:180px;"

>



<input

id="customer-phone"

type="text"

placeholder="Phone"

style="padding:12px;flex:1;min-width:180px;"

>



<input

id="customer-address"

type="text"

placeholder="Address"

style="padding:12px;flex:1;min-width:180px;"

>



<button

id="add-customer-btn"

style="padding:12px 20px;cursor:pointer;"

>

+ Add Customer

</button>

</div>



<!-- Search -->

<input

id="customer-search"

type="text"

placeholder="Search customer..."

style="

width:100%;

padding:12px;

margin-bottom:20px;

border-radius:10px;

border:1px solid #ccc;

font-size:16px;

">



<!-- Table -->

<table id="customers-table">

<thead>

<tr>

<th>Name</th>

<th>Phone</th>

<th>Address</th>

<th>Actions</th>

</tr>

</thead>



<tbody>

</tbody>

</table>
