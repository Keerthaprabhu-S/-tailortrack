){

window.location.href=

"../login.html";

}

</script>

<aside class="sidebar">

<div class="logo">

<h2>🧵 TailorTrack</h2>

</div>

<ul>

<div class="box">

<div class="customer-form">

id="customer-name"

type="text"

placeholder="Customer Name"

>



<input

type="text"

placeholder="Phone Number"

>



<input

id="customer-address"

type="text"

placeholder="Address"

>



<button

class="add-btn"

>

+ Add Customer

</button>

</div>



<input

id="customer-search"

type="text"

placeholder="🔍 Search customer..."

>



<table id="customers-table">
