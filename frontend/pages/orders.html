<!DOCTYPE html>

<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport"

content="width=device-width, initial-scale=1.0">

<title>Orders</title>

<link rel="stylesheet"

href="../css/style.css">

</head>

<body>

<script>

if(

localStorage.getItem(

"isLoggedIn"

)!=="true"

){

window.location.href=

"../login.html";

}

</script>

<div class="container">

<aside class="sidebar">

<div class="logo">

<h2>🧵 TailorTrack</h2>

<p>Smart Tailoring Shop</p>

</div>

<ul>

<li>

<a href="../index.html">

Dashboard

</a>

</li>

<li>

<a href="customers.html">

Customers

</a>

</li>

<li class="active">

<a href="orders.html">

Orders

</a>

</li>

<li>

<a href="tailors.html">

Tailors

</a>

</li>

<li>

<a href="payments.html">

Payments

</a>

</li>

<li>

<a href="expenses.html">

Expenses

</a>

</li>

</ul>

</aside>



<main class="main-content">

<div class="top-bar">

<h1>Orders</h1>

</div>



<div class="box">



<div class="customer-form">

<select id="order-customer">

<option value="">

Select Customer

</option>

</select>



<input

id="order-dress"

type="text"

placeholder="Dress Type"

>

<div class="date-field">

<label for="order-date">

Order Date

</label>

<input

id="order-date"

type="date"

>

</div>


<div class="date-field">

<label for="delivery-date">

Delivery Date

</label>

<input

id="delivery-date"

type="date"

>

</div>

</div>



<div class="customer-form">

<input

id="order-notes"

type="text"

placeholder="Customer Notes"

>



<button

id="add-order-btn"

class="add-btn"

>

+ Add Order

</button>

</div>



<input

id="order-search"

type="text"

placeholder="🔍 Search orders..."

class="search-box"

>



<table id="orders-table">

<thead>

<tr>

<th>Customer</th>

<th>Dress Type</th>

<th>Order Date</th>

<th>Delivery Date</th>

<th>Status</th>

<th>Actions</th>

</tr>

</thead>



<tbody>

</tbody>

</table>



</div>

</main>

</div>



<script src="../js/api.js"></script>

<script src="../js/orders.js"></script>

</body>

</html>
